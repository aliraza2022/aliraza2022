</text>

<text class="matrix" x="440">

<animate attributeName="y"
values="-750;800"
dur="11s"
repeatCount="indefinite"/>

1011001010101010101010101010101010101010101010101010
</text>

<text class="matrix" x="520">

<animate attributeName="y"
values="-650;800"
dur="10s"
