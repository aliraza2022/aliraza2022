110100110100110100110100110100110100110100110100110100
</text>

<text class="matrix" x="1320">
<animate attributeName="y" values="-980;800" dur="15s" repeatCount="indefinite"/>
011001011001011001011001011001011001011001011001011001
</text>

<text class="matrix" x="1400">
<animate attributeName="y" values="-760;800" dur="10.5s" repeatCount="indefinite"/>
101010111100001010101111000010101011110000101010111100
</text>

<text class="matrix" x="1480">
<animate attributeName="y" values="-890;800" dur="12.5s" repeatCount="indefinite"/>
001111000011110000111100001111000011110000111100001111
</text>

</g>

  <!-- ================= CENTER CONTENT ================= -->

<g filter="url(#glow)">

<text
x="800"
y="315"
text-anchor="middle"
class="title">

ALIRAZA KADRI

<animate
attributeName="opacity"
values="0.85;1;0.85"
dur="4s"
repeatCount="indefinite"/>

</text>

<text
x="800"
y="365"
text-anchor="middle"
class="role">

Python Developer

</text>

<text
x="800"
y="395"
text-anchor="middle"
class="role">

AI Developer

</text>

<text
x="800"
y="425"
text-anchor="middle"
class="role">

Cybersecurity Learner

</text>

