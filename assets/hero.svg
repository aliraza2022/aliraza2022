  <g opacity="0.18">

<text class="matrix" x="680">
<animate attributeName="y" values="-900;800" dur="11s" repeatCount="indefinite"/>
101010101010101010101010101010101010101010101010101010
</text>

<text class="matrix" x="760">
<animate attributeName="y" values="-700;800" dur="9s" repeatCount="indefinite"/>
110011001100110011001100110011001100110011001100110011
</text>

<text class="matrix" x="840">
<animate attributeName="y" values="-850;800" dur="12s" repeatCount="indefinite"/>
010101010101010101010101010101010101010101010101010101
</text>

<text class="matrix" x="920">
<animate attributeName="y" values="-1000;800" dur="14s" repeatCount="indefinite"/>
