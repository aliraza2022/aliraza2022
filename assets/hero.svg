<!-- Soft glow behind text -->

<ellipse
cx="800"
cy="355"
rx="260"
ry="110"
fill="#00ff88"
opacity="0.05">

<animate
attributeName="opacity"
values="0.03;0.08;0.03"
dur="5s"
repeatCount="indefinite"/>

</ellipse>

  <!-- ================= VIGNETTE ================= -->

<rect
x="0"
y="0"
width="1600"
height="700"
fill="url(#bg)"
opacity="0.08"/>

<!-- Bottom Glow -->

<ellipse
cx="800"
cy="690"
rx="650"
ry="120"
fill="#00ff88"
opacity="0.05">

<animate
attributeName="opacity"
values="0.03;0.08;0.03"
dur="6s"
repeatCount="indefinite"/>

</ellipse>

<!-- Small Stars -->

<circle cx="180" cy="120" r="1" fill="#00ff88">
<animate attributeName="opacity"
values="0.2;1;0.2"
dur="4s"
repeatCount="indefinite"/>
</circle>

<circle cx="1450" cy="180" r="1.2" fill="#00ff88">
<animate attributeName="opacity"
values="0.1;1;0.1"
dur="5s"
repeatCount="indefinite"/>
</circle>

<circle cx="1220" cy="540" r="1" fill="#00ff88">
<animate attributeName="opacity"
values="0.3;1;0.3"
dur="3s"
repeatCount="indefinite"/>
</circle>

<circle cx="350" cy="520" r="1.1" fill="#00ff88">
<animate attributeName="opacity"
values="0.2;1;0.2"
