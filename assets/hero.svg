<svg
xmlns="http://www.w3.org/2000/svg"
viewBox="0 0 1600 700"
width="1600"
height="700"
preserveAspectRatio="xMidYMid slice">

<defs>

<linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">

<stop offset="0%" stop-color="#050505"/>

<stop offset="100%" stop-color="#0D1117"/>

</linearGradient>

<filter id="glow">

<feGaussianBlur stdDeviation="3" result="blur"/>

<feMerge>

<feMergeNode in="blur"/>

<feMergeNode in="SourceGraphic"/>

</feMerge>

</filter>

<style>

.title{

fill:white;

font-size:64px;

font-family:Arial,Helvetica,sans-serif;

font-weight:bold;

letter-spacing:8px;

filter:url(#glow);

}

.role{

fill:#00ff88;

font-size:24px;

font-family:Arial,Helvetica,sans-serif;

letter-spacing:4px;

}

.matrix{

fill:#00ff88;

font-size:18px;

opacity:.2;

font-family:monospace;

}

</style>

</defs>

<rect width="100%" height="100%" fill="url(#bg)"/>

  <!-- ================= MATRIX RAIN ================= -->

<g opacity="0.22">

<text class="matrix" x="40">

<animate attributeName="y"
values="-700;800"
dur="10s"
repeatCount="indefinite"/>

0101010110010101010101010101010101010101010101010101
</text>

<text class="matrix" x="120">

